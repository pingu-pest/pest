<!DOCTYPE html>
<html>
<head>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" href="apple-touch-icon-180x180.png" sizes="180x180">
  <link rel="icon" type="image/png" href="android-chrome-192x192.png" sizes="192x192">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Home page for pest!</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">
</head>
<body>
  <section class="hero is-info">
    <div class="hero-body">
      <p class="title">さあペストの世界へ！</p>
      <p class="subtitle">ペストたちが君のことを待っている</p>
    </div>
  </section>
  <section>
    <form class="box" name="login_form">
      <div class="field">
        <label class="label">パスワード</label>
        <div class="control">
          <input name="id" class="input" type="id" placeholder="パスワード" />
        </div>
      </div>
      <button class="button is-primary" type="button" onClick="nextPage();">ログイン</button>
      <script type="text/javascript">
      function nextPage() {
        id = document.login_form.id.value
        location.href = id + ".html";
      }
      </script>
    </form>
  </section>
</body>
</html>
